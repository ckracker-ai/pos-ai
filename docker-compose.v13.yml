# Overlay sandbox — stack aislado en paralelo (puertos alternativos).
#
# Stack principal POS-AI v1.4:
#   docker compose up -d --build
#   → erp_core_db_v13, puertos 80 / 3000
#
# Stack sandbox (segundo proyecto Docker, mismos servicios pos-*):
#   cp .env.v13.example .env.v13
#   docker compose -p pos-ai-sandbox -f docker-compose.yml -f docker-compose.v13.yml --env-file .env.v13 up -d --build
#   → puertos 8080 / 3001 / 3307

services:
  pos-frontend:
    container_name: pos-ai-sandbox-frontend
    ports:
      - '${FRONTEND_PORT:-8080}:80'

  pos-api-bff:
    container_name: pos-ai-sandbox-api-bff
    ports:
      - '${BFF_PORT:-3001}:3000'

  pos-api-core:
    container_name: pos-ai-sandbox-api-core
    environment:
      - DB_NAME=${DB_NAME:-erp_core_db_v13}

  db-mysql:
    container_name: pos-ai-sandbox-db-mysql
    ports:
      - '${MYSQL_PORT:-3307}:3306'
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-erp_core_db_v13}
    volumes:
      - datos_mysql_v13:/var/lib/mysql
      - ./db-init:/docker-entrypoint-initdb.d

volumes:
  datos_mysql_v13:
    driver: local
