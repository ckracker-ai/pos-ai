# Overlay sandbox — segundo stack POS-AI (puertos alternativos).
#
# Stack principal:
#   docker compose up -d --build
#   → puertos 8010 / 2020 / 1010 / 3308
#
# Stack sandbox:
#   cp .env.sandbox.example .env.sandbox
#   docker compose -p pos-ai-sandbox -f docker-compose.yml -f docker-compose.sandbox.yml --env-file .env.sandbox up -d --build
#   → puertos 8080 / 2021 / 1011 / 3307

services:
  pos-frontend:
    container_name: pos-ai-sandbox-frontend
    ports:
      - '${FRONTEND_PORT:-8080}:80'

  pos-api-bff:
    container_name: pos-ai-sandbox-api-bff
    ports:
      - '${BFF_PORT:-2021}:2020'

  pos-api-core:
    container_name: pos-ai-sandbox-api-core
    ports:
      - '${CORE_PORT:-1011}:1010'

  pos-ai-db-mysql:
    container_name: pos-ai-sandbox-db-mysql
    ports:
      - '${MYSQL_PORT:-3307}:3306'
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pos-ai-db}
    volumes:
      - pos_ai_mysql_sandbox:/var/lib/mysql
      - ./db-init:/docker-entrypoint-initdb.d

volumes:
  pos_ai_mysql_sandbox:
    driver: local
