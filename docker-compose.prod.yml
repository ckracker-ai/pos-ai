# Overlay de producción / VPS — NO reemplaza docker-compose.yml
#
# Desarrollo (sin cambios):
#   docker compose up -d
#
# Producción con Nginx (HTTP hasta tener certs; HTTPS automático al detectarlos):
#   cp .env.prod.example .env.prod
#   # Editar dominios y secretos
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Emitir certificados Let's Encrypt (DNS del VPS apuntando ya configurado):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod --profile certbot run --rm certbot

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: svm-nginx
    restart: unless-stopped
    ports:
      - '${NGINX_HTTP_PORT:-80}:80'
      - '${NGINX_HTTPS_PORT:-443}:443'
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-app.localhost}
      API_DOMAIN: ${API_DOMAIN:-api.localhost}
      FRONTEND_UPSTREAM: frontend:80
      BFF_UPSTREAM: api-bff:3000
      SSL_MODE: ${SSL_MODE:-auto}
    volumes:
      - ./nginx/conf.d/00-http.conf:/etc/nginx/conf.d/00-http.conf:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/certs:/etc/letsencrypt:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ['/bin/sh', '/entrypoint.sh']
    networks:
      - public_gateway
    depends_on:
      - frontend
      - api-bff
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    ports: !reset
    environment:
      BFF_INTERNAL_URL: http://api-bff:3000
      AUTH_URL: http://api-bff:3000
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_INTERNAL_KEY: ${INTERNAL_API_KEY:-supersecretkey}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        BFF_INTERNAL_URL: http://api-bff:3000

  api-bff:
    ports: !reset
    environment:
      NODE_ENV: production
    volumes: !reset

  api-core:
    volumes: !reset

  certbot:
    profiles: [certbot]
    image: certbot/certbot:latest
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - ./nginx/html:/usr/share/nginx/html
    networks:
      - public_gateway

  db-mysql:
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-S3d4f5g6_}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-erp_core_db}
      MYSQL_USER: ${MYSQL_USER:-usr_erp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Usr@12345}
