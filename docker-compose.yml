name: pos-ai

services:
  # ==========================================
  # POS-AI v1.4 — Frontend (host :8010)
  # ==========================================
  pos-frontend:
    build:
      context: ./pos-frontend
      args:
        NEXT_PUBLIC_INTERNAL_KEY: ${INTERNAL_API_KEY:-supersecretkey}
        NEXT_PUBLIC_API_URL: ''
        BFF_INTERNAL_URL: http://pos-api-bff:2020
        NEXT_PUBLIC_APP_VERSION: ${APP_VERSION:-1.4.0}
    container_name: pos-ai-frontend
    restart: unless-stopped
    ports:
      - '8010:80'
    environment:
      BFF_INTERNAL_URL: http://pos-api-bff:2020
      AUTH_URL: http://pos-api-bff:2020
      NEXT_PUBLIC_APP_VERSION: ${APP_VERSION:-1.4.0}
    networks:
      - public_gateway
    depends_on:
      pos-api-bff:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:80/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  # ==========================================
  # POS-AI v1.4 — BFF (host :2020, prefijo /pos/proxy)
  # ==========================================
  pos-api-bff:
    build: ./pos-api-bff
    container_name: pos-ai-api-bff
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - '2020:2020'
    environment:
      - NODE_ENV=development
      - PORT=2020
      - API_PREFIX=/pos/proxy
      - CORE_API_BASE_URL=http://pos-api-core:1010
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-supersecretkey}
      - PLATFORM_ADMIN_EMAIL=${PLATFORM_ADMIN_EMAIL:-platform@pos-ai.local}
      - PLATFORM_ADMIN_PASSWORD=${PLATFORM_ADMIN_PASSWORD:-PlatformAdmin2026!}
      - JWT_SECRET=${JWT_SECRET:-pos_ai_jwt_secret_key_2026}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-pos_ai_jwt_refresh_secret_2026}
      - APP_VERSION=${APP_VERSION:-1.4.0}
    volumes:
      - ./pos-api-bff:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - public_gateway
      - internal_backend
    depends_on:
      pos-api-core:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:2020/pos/proxy/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ==========================================
  # POS-AI v1.4 — Core API (multi-tenant, puerto 1010)
  # ==========================================
  pos-api-core:
    build: ./pos-api-core
    container_name: pos-ai-api-core
    user: "1000:1000"
    ports:
      - '1010:1010'
    environment:
      - NODE_ENV=production
      - DB_SYNC_ALTER=false
      - DB_SEED_ROLES=true
      - PORT=1010
      - CORE_PORT=1010
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-supersecretkey}
      - JWT_SECRET=${JWT_SECRET:-pos_ai_jwt_secret_key_2026}
      - BOOTSTRAP_ADMIN_ENABLED=${BOOTSTRAP_ADMIN_ENABLED:-true}
      - BOOTSTRAP_ADMIN_EMAIL=${BOOTSTRAP_ADMIN_EMAIL:-admin@empanadascostaazul.cl}
      - BOOTSTRAP_ADMIN_PASSWORD=${BOOTSTRAP_ADMIN_PASSWORD:-@dmin123_}
      - BOOTSTRAP_ADMIN_FULL_NAME=${BOOTSTRAP_ADMIN_FULL_NAME:-Administrador Costa Azul}
      - BOOTSTRAP_ADMIN_BRANCH_NAME=${BOOTSTRAP_ADMIN_BRANCH_NAME:-Sucursal Central}
      - BOOTSTRAP_ADMIN_RESET_PASSWORD=${BOOTSTRAP_ADMIN_RESET_PASSWORD:-false}
      - APP_VERSION=${APP_VERSION:-1.4.0}
      - DB_HOST=pos-ai-db-mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-pos-ai-db}
      - DB_USER=${DB_USER:-usr_pos_ai}
      - DB_PASSWORD=${DB_PASSWORD:-Usr@12345}
    volumes:
      - ./pos-api-core:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - internal_backend
      - public_gateway
    deploy:
      restart_policy:
        condition: on-failure
    depends_on:
      pos-ai-db-mysql:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:1010/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================
  # MySQL — pos-ai-db (3306 interno; host 3308 por defecto)
  # ==========================================
  pos-ai-db-mysql:
    image: mysql:8.0
    container_name: pos-ai-db-mysql
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - '${MYSQL_HOST_PORT:-3308}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-S3d4f5g6_}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pos-ai-db}
      MYSQL_USER: ${MYSQL_USER:-usr_pos_ai}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Usr@12345}
    volumes:
      - pos_ai_mysql_data:/var/lib/mysql
      - ./db-init:/docker-entrypoint-initdb.d
    networks:
      - internal_backend
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  public_gateway:
    driver: bridge
  internal_backend:
    internal: true

volumes:
  pos_ai_mysql_data:
    driver: local
