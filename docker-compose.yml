name: pos-ai

services:
  # ==========================================
  # POS-AI v1.4 â€” Frontend (host :8010)
  # ==========================================
  pos-frontend:
    build:
      context: ./pos-frontend
      args:
        NEXT_PUBLIC_INTERNAL_KEY: ${INTERNAL_API_KEY:-supersecretkey}
        NEXT_PUBLIC_API_URL: ''
        BFF_INTERNAL_URL: http://pos-api-bff:2020
        NEXT_PUBLIC_APP_VERSION: ${APP_VERSION:-1.4.0}
    container_name: pos-ai-frontend
    restart: unless-stopped
    ports:
      - '8010:80'
    environment:
      BFF_INTERNAL_URL: http://pos-api-bff:2020
      AUTH_URL: http://pos-api-bff:2020
      NEXT_PUBLIC_APP_VERSION: ${APP_VERSION:-1.4.0}
    networks:
      - public_gateway
    depends_on:
      pos-api-bff:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:80/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  # ==========================================
  # POS-AI v1.4 â€” BFF (host :2020, prefijo /pos/proxy)
  # ==========================================
  pos-api-bff:
    build: ./pos-api-bff
    container_name: pos-ai-api-bff
    restart: unless-stopped
    user: "1000:1000"
    command: sh -c "if [ -f dist/server.js ]; then node dist/server.js; else npm ci && npm run build && node dist/server.js; fi"
    ports:
      - '2020:2020'
    environment:
      - NODE_ENV=development
      - PORT=2020
      - API_PREFIX=/pos/proxy
      - CORE_API_BASE_URL=http://pos-api-core:1010
      - ASSISTANT_API_BASE_URL=http://pos-api-assistant:3030
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-supersecretkey}
      - SUBSCRIPTION_WEBHOOK_SECRET=${SUBSCRIPTION_WEBHOOK_SECRET:-supersecretkey}
      - PAYMENT_GATEWAY_WEBHOOK_SECRET=${PAYMENT_GATEWAY_WEBHOOK_SECRET:-supersecretkey}
      - PAYMENT_WEBHOOK_HMAC_SECRET=${PAYMENT_WEBHOOK_HMAC_SECRET:-supersecretkey}
      - FRONTEND_PUBLIC_URL=${FRONTEND_PUBLIC_URL:-http://localhost:8010}
      - PLATFORM_ADMIN_EMAIL=${PLATFORM_ADMIN_EMAIL:-platform@pos-ai.local}
      - PLATFORM_ADMIN_PASSWORD=${PLATFORM_ADMIN_PASSWORD:-PlatformAdmin2026!}
      - JWT_SECRET=${JWT_SECRET:-pos_ai_jwt_secret_key_2026}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-pos_ai_jwt_refresh_secret_2026}
      - APP_VERSION=${APP_VERSION:-1.4.0}
    volumes:
      - ./pos-api-bff:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - public_gateway
      - internal_backend
    depends_on:
      pos-api-core:
        condition: service_healthy
      pos-api-assistant:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:2020/pos/proxy/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ==========================================
  # POS-AI v1.7 â€” Assistant WhatsApp (plan EstĂˇndar, puerto 3030)
  # ==========================================
  pos-api-assistant:
    build: ./pos-api-assistant
    container_name: pos-ai-api-assistant
    restart: unless-stopped
    ports:
      - '3030:3030'
    environment:
      - NODE_ENV=development
      - PORT=3030
      - CORE_API_BASE_URL=http://pos-api-core:1010
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-supersecretkey}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN:-pos-ai-dev-verify}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN:-}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID:-}
      - WHATSAPP_API_VERSION=${WHATSAPP_API_VERSION:-v21.0}
      - META_APP_SECRET=${META_APP_SECRET:-}
      - PAYMENT_WEBHOOK_SECRET=${PAYMENT_WEBHOOK_SECRET:-}
    networks:
      - internal_backend
      - public_gateway
    depends_on:
      pos-api-core:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3030/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ==========================================
  # POS-AI v1.4 â€” Core API (multi-tenant, puerto 1010)
  # ==========================================
  pos-api-core:
    build: ./pos-api-core
    container_name: pos-ai-api-core
    user: "1000:1000"
    ports:
      - '1010:1010'
    environment:
      - NODE_ENV=production
      - DB_SYNC_ALTER=false
      - DB_SEED_ROLES=true
      - PORT=1010
      - CORE_PORT=1010
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-supersecretkey}
      - JWT_SECRET=${JWT_SECRET:-pos_ai_jwt_secret_key_2026}
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY:-pos_ai_field_encryption_key_2026_32bytes_min}
      - BOOTSTRAP_ADMIN_ENABLED=${BOOTSTRAP_ADMIN_ENABLED:-true}
      - BOOTSTRAP_ADMIN_EMAIL=${BOOTSTRAP_ADMIN_EMAIL:-admin@empanadascostaazul.cl}
      - BOOTSTRAP_ADMIN_PASSWORD=${BOOTSTRAP_ADMIN_PASSWORD:-@dmin123_}
      - BOOTSTRAP_ADMIN_FULL_NAME=${BOOTSTRAP_ADMIN_FULL_NAME:-Administrador Costa Azul}
      - BOOTSTRAP_ADMIN_BRANCH_NAME=${BOOTSTRAP_ADMIN_BRANCH_NAME:-Sucursal Central}
      - BOOTSTRAP_ADMIN_RESET_PASSWORD=${BOOTSTRAP_ADMIN_RESET_PASSWORD:-false}
      - BOOTSTRAP_DEMO_USERS_ENABLED=${BOOTSTRAP_DEMO_USERS_ENABLED:-true}
      - BOOTSTRAP_SELLER_EMAIL=${BOOTSTRAP_SELLER_EMAIL:-vendedor@empanadascostaazul.cl}
      - BOOTSTRAP_SELLER_PASSWORD=${BOOTSTRAP_SELLER_PASSWORD:-Vendedor@12345}
      - BOOTSTRAP_DEMO_USERS_RESET_PASSWORD=${BOOTSTRAP_DEMO_USERS_RESET_PASSWORD:-false}
      - BOOTSTRAP_PLATFORM_ADMIN_ENABLED=${BOOTSTRAP_PLATFORM_ADMIN_ENABLED:-true}
      - PLATFORM_ADMIN_EMAIL=${PLATFORM_ADMIN_EMAIL:-platform@pos-ai.local}
      - PLATFORM_ADMIN_PASSWORD=${PLATFORM_ADMIN_PASSWORD:-PlatformAdmin2026!}
      - APP_VERSION=${APP_VERSION:-1.4.0}
      - PAYMENT_LINK_BASE_URL=${PAYMENT_LINK_BASE_URL:-https://pay.pos-ai.local/p}
      - PAYMENT_PROVIDER=${PAYMENT_PROVIDER:-WEBPAY}
      - WEBPAY_MODE=${WEBPAY_MODE:-integration}
      - WEBPAY_COMMERCE_CODE=${WEBPAY_COMMERCE_CODE:-597010000500}
      - WEBPAY_API_SECRET=${WEBPAY_API_SECRET:-5729914e0d440847db17ef8755dcb4b14187bbc23e206514b7e256b755c0459a}
      - PAYMENT_SANDBOX_RETURN_BASE_URL=${PAYMENT_SANDBOX_RETURN_BASE_URL:-http://localhost:8010}
      - WEBPAY_API_BASE_URL=${WEBPAY_API_BASE_URL:-https://webpay3gint.transbank.cl}
      - PAYMENT_CHECKOUT_TOKEN_SECRET=${PAYMENT_CHECKOUT_TOKEN_SECRET:-supersecretkey}
      - PAYMENT_WEBHOOK_HMAC_SECRET=${PAYMENT_WEBHOOK_HMAC_SECRET:-supersecretkey}
      - PAYMENT_SANDBOX_RETURN_BASE_URL=${PAYMENT_SANDBOX_RETURN_BASE_URL:-http://localhost:8010}
      - DB_HOST=pos-ai-db-mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-pos-ai-db}
      - DB_USER=${DB_USER:-usr_pos_ai}
      - DB_PASSWORD=${DB_PASSWORD:-Usr@12345}
    volumes:
      - ./pos-api-core:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - internal_backend
      - public_gateway
    deploy:
      restart_policy:
        condition: on-failure
    depends_on:
      pos-ai-db-mysql:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:1010/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================
  # MySQL â€” pos-ai-db (3306 interno; host 3308 por defecto)
  # ==========================================
  pos-ai-db-mysql:
    image: mysql:8.0
    container_name: pos-ai-db-mysql
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - '${MYSQL_HOST_PORT:-3308}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-S3d4f5g6_}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pos-ai-db}
      MYSQL_USER: ${MYSQL_USER:-usr_pos_ai}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Usr@12345}
    volumes:
      - pos_ai_mysql_data:/var/lib/mysql
      - ./db-init:/docker-entrypoint-initdb.d
    networks:
      - internal_backend
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  public_gateway:
    driver: bridge
  internal_backend:
    internal: true

volumes:
  pos_ai_mysql_data:
    driver: local
